{% extends "base.html" %}

{% block content %}
<div class="main-content">
  <div class="content-header">
    <div>
      <h1>Edit Order</h1>
      <p class="subtitle">Update order details</p>
    </div>
    <a href="/orders" class="btn btn-secondary">
      <i class="fas fa-arrow-left"></i>
      Back to Orders
    </a>
  </div>

  <div class="edit-form card">
    <form id="editOrderForm">
      <div class="form-row">
        <div class="form-group">
          <label for="itemName">Item</label>
          <input type="text" id="itemName" value="{{ order.item.name }}" disabled>
        </div>
        <div class="form-group">
          <label for="category">Category</label>
          <input type="text" id="category" value="{{ order.item.category }}" disabled>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="quantity">Quantity</label>
          <input type="number" id="quantity" name="quantity" value="{{ order.quantity }}" min="0" step="1" required>
        </div>
        <div class="form-group">
          <label for="orderDate">Order By Date</label>
          <input type="date" id="orderDate" name="order_date" value="{{ order.order_date or '' }}">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="status">Status</label>
          <select id="status" name="status" required>
            <option value="pending" {% if order.status == 'pending' %}selected{% endif %}>Pending</option>
            <option value="ordered" {% if order.status == 'ordered' %}selected{% endif %}>Ordered</option>
            <option value="received" {% if order.status == 'received' %}selected{% endif %}>Received</option>
            <option value="cancelled" {% if order.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="notes">Notes</label>
          <textarea id="notes" name="notes" rows="4" placeholder="Add notes about this order...">{{ order.notes or '' }}</textarea>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">
          <i class="fas fa-save"></i>
          Save Changes
        </button>
        <a href="/orders" class="btn btn-secondary">
          <i class="fas fa-times"></i>
          Cancel
        </a>
      </div>
    </form>
  </div>
</div>

<style>
.edit-form {
  max-width: 600px;
  margin: 0 auto;
  padding: 30px;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 20px;
}

.form-row:last-of-type {
  grid-template-columns: 1fr;
}

.form-group {
  display: flex;
  flex-direction: column;
}

.form-group label {
  margin-bottom: 8px;
  font-weight: 600;
  color: var(--text);
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.form-group input,
.form-group select,
.form-group textarea {
  padding: 10px 12px;
  border: 1px solid var(--stroke);
  border-radius: 6px;
  background-color: var(--card2);
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  transition: border-color 0.2s;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  outline: none;
  border-color: var(--primary);
  background-color: var(--card);
}

.form-group input:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.form-group textarea {
  resize: vertical;
  font-family: inherit;
}

/* Light theme */
body.light-theme .form-group input,
body.light-theme .form-group select,
body.light-theme .form-group textarea {
  background-color: #f9fafb;
  border-color: #d1d5db;
}

body.light-theme .form-group input:focus,
body.light-theme .form-group select:focus,
body.light-theme .form-group textarea:focus {
  background-color: #ffffff;
  border-color: #2563eb;
}

.form-actions {
  display: flex;
  gap: 10px;
  margin-top: 30px;
  padding-top: 20px;
  border-top: 1px solid var(--stroke);
}

.form-actions .btn {
  flex: 1;
  text-align: center;
}

@media (max-width: 768px) {
  .edit-form {
    padding: 20px;
  }

  .form-row {
    grid-template-columns: 1fr;
    gap: 15px;
  }

  .form-actions {
    flex-direction: column;
  }
}
</style>

<script>
document.getElementById('editOrderForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  // Extract order ID from URL like /order/123/edit
  const pathParts = window.location.pathname.split('/');
  const orderId = pathParts[pathParts.length - 2];
  
  const formData = {
    quantity: parseInt(document.getElementById('quantity').value) || 0,
    order_date: document.getElementById('orderDate').value,
    status: document.getElementById('status').value,
    notes: document.getElementById('notes').value
  };

  try {
    const response = await fetch(`/order/${orderId}/update`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(formData)
    });

    const data = await response.json();

    if (data.success) {
      alert('Order updated successfully');
      window.location.href = '/orders';
    } else {
      alert('Error updating order: ' + (data.error || 'Unknown error'));
      console.error('Server error:', data.error);
    }
  } catch (error) {
    console.error('Error:', error);
    alert('Failed to update order');
  }
});
</script>
{% endblock %}
