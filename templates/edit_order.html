{% extends "base.html" %}

{% block content %}

<section class="card" style="max-width:640px; margin:0 auto;">
  <div class="cardhead">
    <h2>Edit Order</h2>
    <a href="/orders" class="btn"><i class="fas fa-arrow-left"></i> Back</a>
  </div>

  <form id="editOrderForm" style="padding:24px;">
    <div class="edit-row">
      <div class="edit-field">
        <label>Item</label>
        <input type="text" class="input" value="{{ order.item.name }}" disabled>
      </div>
      <div class="edit-field">
        <label>Category</label>
        <input type="text" class="input" value="{{ order.item.category }}" disabled>
      </div>
    </div>

    <div class="edit-row">
      <div class="edit-field">
        <label>Quantity</label>
        <input type="number" id="quantity" class="input" name="quantity"
               value="{{ order.quantity }}" min="0" step="1" required>
      </div>
      <div class="edit-field">
        <label>Order By Date</label>
        <input type="date" id="orderDate" class="input" name="order_date"
               value="{{ order.order_date or '' }}">
      </div>
    </div>

    <div class="edit-row">
      <div class="edit-field">
        <label>Status</label>
        <select id="status" class="input" name="status" required>
          <option value="pending"   {% if order.status == 'pending'   %}selected{% endif %}>Pending</option>
          <option value="ordered"   {% if order.status == 'ordered'   %}selected{% endif %}>Ordered</option>
          <option value="received"  {% if order.status == 'received'  %}selected{% endif %}>Received</option>
          <option value="cancelled" {% if order.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
        </select>
      </div>
    </div>

    <div class="edit-field" style="margin-bottom:24px;">
      <label>Notes</label>
      <textarea id="notes" class="input" name="notes" rows="4"
                placeholder="Add notes…" style="resize:vertical; font-family:inherit;">{{ order.notes or '' }}</textarea>
    </div>

    <div style="display:flex; gap:10px; padding-top:20px; border-top:1px solid var(--stroke);">
      <button type="submit" class="btn primary" style="flex:1;">
        <i class="fas fa-save"></i> Save Changes
      </button>
      <a href="/orders" class="btn" style="flex:1; text-align:center;">
        <i class="fas fa-times"></i> Cancel
      </a>
    </div>
  </form>
</section>

<style>
.edit-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;
}
.edit-field {
  display: flex; flex-direction: column; gap: 6px;
}
.edit-field label {
  font-size: 12px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .5px; color: var(--text-muted);
}
.edit-field input:disabled { opacity: .55; cursor: not-allowed; }

@media (max-width: 560px) {
  .edit-row { grid-template-columns: 1fr; }
}
</style>

<script>
document.getElementById('editOrderForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  const parts   = window.location.pathname.split('/');
  const orderId = parts[parts.length - 2];

  const body = {
    quantity:   parseInt(document.getElementById('quantity').value) || 0,
    order_date: document.getElementById('orderDate').value,
    status:     document.getElementById('status').value,
    notes:      document.getElementById('notes').value
  };

  try {
    const r    = await fetch(`/order/${orderId}/update`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await r.json();
    if (data.success) {
      window.location.href = '/orders';
    } else {
      alert('Error: ' + (data.error || 'Unknown error'));
    }
  } catch (err) {
    console.error(err);
    alert('Failed to update order');
  }
});
</script>

{% endblock %}
