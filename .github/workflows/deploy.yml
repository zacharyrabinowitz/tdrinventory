# DISABLED: this workflow was copied from a different project (employee-portal)
# and does not deploy this app (draft-room-inventory). It has been disabled
# (trigger removed) to stop it from restarting an unrelated production service
# on every push to this repo. Left in place, not deleted, pending review.
name: Deploy to Production (disabled)

on:
  workflow_dispatch: {}

jobs:
  deploy:
    if: false
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/employee-portal
            git pull
            source venv/bin/activate
            python3 migrate.py
            sudo systemctl restart employee-portal